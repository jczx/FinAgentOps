services:
  postgres:
    image: postgres:16-alpine
    container_name: finagentops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in your .env file}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in your .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - finagentops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in your .env file} -d ${POSTGRES_DB:?Set POSTGRES_DB in your .env file}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finagentops_postgres_data:
