services:
  postgres:
    image: postgres:16-alpine
    container_name: finagentops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finagentops}
      POSTGRES_USER: ${POSTGRES_USER:-finagentops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finagentops_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - finagentops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finagentops_user} -d ${POSTGRES_DB:-finagentops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finagentops_postgres_data:
